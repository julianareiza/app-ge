name: Canary / A-B Deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - deploy
          - promote
          - rollback
      canary_image_tag:
        description: "Image tag for canary (required for deploy)"
        required: false
        default: "latest"
      canary_weight:
        description: "Traffic weight for canary (0-100)"
        required: false
        default: "20"

# env:
#   AWS_REGION: ${{ secrets.AWS_REGION }}
#   EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

env:
  IMAGE_NAME: julianareiza/app-ge

jobs:
  canary:
    name: Canary ${{ github.event.inputs.action }}
    runs-on: arc-runner-set-app
    steps:
      - uses: actions/checkout@v4

      - name: Instalar kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ env.AWS_REGION }}

      # - name: Update kubeconfig
      #   run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      # --- DEPLOY CANARY ---
      - name: Deploy canary
        if: github.event.inputs.action == 'deploy'
        run: |
          TAG="${{ github.event.inputs.canary_image_tag }}"
          WEIGHT="${{ github.event.inputs.canary_weight }}"

          # Update canary image and version
          sed -i "s|julianareiza/app-ge:.*|julianareiza/app-ge:${TAG}|g" k8s/canary/deployment-canary.yml
          sed -i "s|value: \"unknown\"|value: \"${TAG}\"|g" k8s/canary/deployment-canary.yml

          # Update canary weight
          sed -i "s|canary-weight: \".*\"|canary-weight: \"${WEIGHT}\"|g" k8s/canary/ingress-canary.yml

          # Apply canary resources
          kubectl apply -f k8s/canary/

          # Wait for rollout
          kubectl rollout status deployment/app-ge-canary -n app --timeout=120s

          echo "Canary deployed with ${WEIGHT}% traffic on tag ${TAG}"
          echo "Monitor Grafana dashboards, then run 'promote' or 'rollback'"

      # --- PROMOTE CANARY TO STABLE ---
      - name: Promote canary
        if: github.event.inputs.action == 'promote'
        run: |
          # Get current canary image
          CANARY_IMAGE=$(kubectl get deployment app-ge-canary -n app -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "Promoting canary image: ${CANARY_IMAGE}"

          # Update stable deployment with canary image
          sed -i "s|julianareiza/app-ge:.*|${CANARY_IMAGE}|g" k8s/base/deployment.yml
          kubectl apply -f k8s/base/deployment.yml

          # Wait for stable rollout
          kubectl rollout status deployment/app-ge -n app --timeout=300s

          # Remove canary resources
          kubectl delete -f k8s/canary/ --ignore-not-found=true

          echo "Canary promoted to stable. Canary resources removed."

      # --- ROLLBACK CANARY ---
      - name: Rollback canary
        if: github.event.inputs.action == 'rollback'
        run: |
          kubectl delete -f k8s/canary/ --ignore-not-found=true
          echo "Canary rolled back. All traffic restored to stable."

      - name: Show status
        run: |
          echo "=== Deployments ==="
          kubectl get deployments -n app
          echo "=== Pods ==="
          kubectl get pods -n app
          echo "=== Ingresses ==="
          kubectl get ingress -n app
