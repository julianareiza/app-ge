name: Test ARC Runner
on:
  push:
    branches:
      - development

jobs:
  test:
    runs-on: arc-runner-set
    steps:
      - name: Instalar kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Verificar kubectl
        run: kubectl version --client

      - name: Listar pods en todos los namespaces
        run: kubectl get pods -A

      - name: Listar namespaces
        run: kubectl get namespaces

      - name: Listar servicios
        run: kubectl get svc -A

      - name: Probar apply con un configmap de prueba
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: test-from-actions
            namespace: default
          data:
            test: "funciona"
          EOF

      - name: Verificar que se creó el configmap
        run: kubectl get configmap test-from-actions -n default

      - name: Limpiar configmap de prueba
        run: kubectl delete configmap test-from-actions -n default
